[mgr]
show_hidden = true
show_symlink = true
linemode = "size"

[[mgr.preview]]
wrap = "yes"

[[mgr.prepend_keymap]]
desc = "Smart filter"
on = "F"
run = "plugin smart-filter"

[[mgr.prepend_keymap]]
desc = "Maximize or restore the preview pane"
on = "T"
run = "plugin max-preview"

[[mgr.prepend_keymap]]
desc = "Chmod on selected files"
on = ["c", "m"]
run = "plugin chmod"

[[mgr.prepend_keymap]]
desc = "Copy to system-clipboard"
on = "<C-y>"
run = "plugin system-clipboard"

[[mgr.prepend_keymap]]
desc = "Archive selected files"
on = ["c", "a"]
run = "plugin compress"

[[mgr.prepend_keymap]]
desc = "Find file by content"
on = ["<Space>", "f", "g"]
run = "plugin fg"

[[mgr.prepend_keymap]]
desc = "Find file by filename"
on = ["<Space>", "f", "f"]
run = "plugin fg --args='fzf'"

[[mgr.prepend_keymap]]
on = ["c", "a", "a"]
run = "plugin compress"
desc = "Archive selected files"

[[mgr.prepend_keymap]]
on = ["c", "a", "p"]
run = "plugin compress -p"
desc = "Archive selected files (password)"

[[mgr.prepend_keymap]]
on = ["c", "a", "h"]
run = "plugin compress -ph"
desc = "Archive selected files (password+header)"

[[mgr.prepend_keymap]]
on = ["c", "a", "l"]
run = "plugin compress -l"
desc = "Archive selected files (compression level)"

[[mgr.prepend_keymap]]
on = ["c", "a", "u"]
run = "plugin compress -phl"
desc = "Archive selected files (password+header+level)"

[[mgr.prepend_keymap]]
on = ["E"]
run = "plugin eza-preview"
desc = "Toggle tree/list dir preview"

[[mgr.prepend_keymap]]
on = ["-"]
run = "plugin eza-preview inc-level"
desc = "Increment tree level"

[[mgr.prepend_keymap]]
on = ["_"]
run = "plugin eza-preview dec-level"
desc = "Decrement tree level"

[[mgr.prepend_keymap]]
on = ["$"]
run = "plugin eza-preview toggle-follow-symlinks"
desc = "Toggle tree follow symlinks"

[[mgr.prepend_keymap]]
on = ["*"]
run = "plugin eza-preview toggle-hidden"
desc = "Toggle hidden files"

[opener]
browser = [
  { run = 'open "$@"', desc = "Open in browser" }
]

[[open.prepend_rules]]
mime = "text/html"
use = "browser"

[[plugin.prepend_previewers]]
name = "*.md"
run = "glow"

[[plugin.prepend_previewers]]
name = "*/"
run = "eza-preview"
